overview: |-
  # Overview
  NKP etcd Maintenance keeps the on-disk size of the cluster's etcd database
  bounded over time by running the open-source
  [ahrtr/etcd-defrag](https://github.com/ahrtr/etcd-defrag) tool on a CronJob.

  ## What's in this virtual catalog
  - **defrag CronJob** (always on, threshold-gated, leader-safe)
  - **snapshot CronJob** (off by default; opt-in via `snapshot.enabled=true`)
  - **PrometheusRule** with 8 alerts (4 etcd-health + 4 CronJob-failure) —
    live-validated end-to-end on 2026-06-14
  - **etcd-quota-bumper** orchestrator (off by default; opt-in via
    `quotaBumper.enabled=true`)

  ## Why this exists
  etcd's storage engine (bbolt) does not reclaim free pages after key deletion.
  Without periodic defragmentation the database file grows monotonically until
  it hits `--quota-backend-bytes`, triggers a `NOSPACE` alarm, and halts the
  Kubernetes control plane.

  ## Safety model
  - **Leader-last ordering.** Maps to `--move-leader`; etcd leadership is
    transferred away from the current leader before that member is defragged.
  - **Cluster health pre-check.** The job aborts before touching any member
    if the cluster is unhealthy.
  - **Threshold rule.** The defrag is a no-op when the database is already compact.

  ## Validation
  End-to-end validated 2026-06-01 (defrag) and 2026-06-14 (alerts + snapshot)
  on `nkp-harsh-test-2` (3-CP, NKP v2.18.0-dev.41, K8s v1.35.2).
k8sVersionSupport: ">=1.30"
