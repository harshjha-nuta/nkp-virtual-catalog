displayName: NKP etcd Maintenance (TEST CATALOG)
description: >-
  Scheduled etcd maintenance for kubeadm-managed NKP clusters. Includes
  leader-safe defragmentation (always on, threshold-gated) and an optional
  snapshot CronJob with verified output and optional S3-compatible upload.
  Restore from a snapshot is intentionally a manual operator workflow.

  This entry is shipped from a **virtual / test** catalog — chart files are
  embedded in the same Git repo, so no external OCI registry is required.
  The production version of this app is published from
  `nutanix-cloud-native/nkp-nutanix-product-catalog` and references an OCI
  chart on `harbor.eng.nutanix.com`.
