---
# ---------------------------------------------------------------------------
# Catalog source: Flux fetches the catalog repository here. The same
# repo also holds the chart files (`charts/nkp-etcd-maintenance`), but the
# HelmRelease declares its OWN GitRepository with a more specific `ignore:`
# rule (see applications/.../release/nkp-etcd-maintenance.yaml) so that
# helm-controller only re-resolves the chart when chart files change.
#
# Replace `spec.url` with one of:
#   - https://github.com/<you>/<repo>.git
#   - oci://...    (requires kind: OCIRepository)
#   - https://git-operator-git.git-operator-system.svc.cluster.local./repositories/<...>.git
# ---------------------------------------------------------------------------
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nkp-virtual-catalog
  namespace: kommander-default-workspace
spec:
  interval: 5m
  url: REPLACE_ME_WITH_CATALOG_GIT_URL
  ref:
    branch: REPLACE_ME_WITH_BRANCH
  ignore: |
    # Only fetch what the catalog Kustomization renders. Everything below
    # `charts/` is consumed by the inner HelmRelease via its own GitRepo.
    /*
    !/applications/**
